# ============================================================
#  VIRTUAL HOST — Ejemplo completo con rate limiting por servicio
#  /etc/nginx/sites-available/mi-app.conf
#
#  Activa con:
#    ln -s /etc/nginx/sites-available/mi-app.conf \
#          /etc/nginx/sites-enabled/mi-app.conf
# ============================================================

# Redirigir HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name bravexcolombia.com www.bravexcolombia.com;

    # Rate limit en HTTP también (anti-scanners)
    limit_req  zone=general burst=50 nodelay;
    limit_conn conn_limit 20;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
#  Servidor principal HTTPS
# ============================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name bravexcolombia.com www.bravexcolombia.com;

    # ✅ Punto de entrada para Zero-Downtime
    root /var/www/vertercloud/landing-page/current/dist;
    index index.html;

    # TLS configurado en /etc/nginx/conf.d/ssl.conf (compartido con todos los vhosts)

    # ----------------------------------------------------------
    # Rate limiting global del vhost
    # Límite de conexiones simultáneas por IP en este server
    # ----------------------------------------------------------
    limit_conn conn_limit 100;

    # ----------------------------------------------------------
    # LOCATION: Archivos estáticos — Pre-comprimidos, sin CPU
    # gzip_static: sirve dist/main.js.gz en vez de comprimir en vivo
    # Reduce CPU de comprimir ~80% al eliminar compresión runtime
    # ----------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|otf|mp4|webm)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        log_not_found off;

        # Sirve el .gz pregenerado si el cliente lo acepta
        gzip_static on;

        # Permitir tráfico alto sin penalización
        limit_req  zone=general burst=500 nodelay;
    }

    # ----------------------------------------------------------
    # LOCATION: Landing / página principal — Rate general
    # 200r/s con burst de 300 sin delay
    # ----------------------------------------------------------
    location / {
        limit_req  zone=general burst=300 nodelay;
        limit_conn conn_limit 80;

        # Bloquear métodos HTTP no estándar
        if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS)$) {
            return 444;
        }

        # HTML nunca cacheado → usuario siempre ve la última versión post-deploy
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------
    # LOCATION: Bloquear archivos sensibles
    # ----------------------------------------------------------
    location ~ /\.(git|env|htaccess|DS_Store) {
        deny all;
        return 404;
    }

    location ~ \.(sql|bak|old|orig|backup|swp|log)$ {
        deny all;
        return 404;
    }

    # ----------------------------------------------------------
    # PÁGINAS DE ERROR personalizadas
    # ----------------------------------------------------------
    error_page 429 /errors/429.html;
    error_page 500 502 503 504 /errors/50x.html;

    location /errors/ {
        internal;
        root /var/www/vertercloud/landing-page;
    }
}