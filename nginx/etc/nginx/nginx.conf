# ============================================================
#  NGINX — Configuración principal
#  Tuneado para: 4 vCPU · 8 GB RAM · 75 GB NVMe · 200 Mbit/s
#  /etc/nginx/nginx.conf
# ============================================================

user www-data;

# 1 worker por vCPU → 4 workers
worker_processes 4;
worker_cpu_affinity auto;

# file descriptors por worker
# 4 workers × 8192 = 32768 conexiones totales máximas
# Bien dentro del límite de RAM y del puerto de 200Mbit/s
worker_rlimit_nofile 8192;

pid /run/nginx.pid;

# ============================================================
#  EVENTS — Modelo de I/O
# ============================================================
events {
    # Conexiones simultáneas por worker
    # 4 workers × 4096 = 16384 conexiones totales
    # Con 200Mbit/s y respuestas ~50KB → ~500 req/s max físico
    # 16384 conexiones keepalive es más que suficiente
    worker_connections 4096;

    # Aceptar múltiples conexiones por wakeup del kernel
    multi_accept on;

    # epoll es la syscall óptima en Linux (>= 2.6)
    use epoll;
}

# ============================================================
#  HTTP
# ============================================================
http {

    # ----------------------------------------------------------
    # MIME types
    # ----------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    # Tráfico general — HTML, assets, bots agresivos
    # 200 req/s por IP es generoso para un humano (nunca llega)
    # pero frena scrapers y scanners automáticos
    limit_req_zone  $binary_remote_addr zone=general:10m  rate=200r/s;

    # Anti-DDoS por conexiones simultáneas (nivel TCP, no req/s)
    # Complementa el rate limit: evita que una IP abra 1000 conexiones
    # keepalive a la vez y agote los file descriptors del worker
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    limit_req_log_level warn;
    limit_conn_log_level warn;
    limit_req_status  429;
    limit_conn_status 429;

    # ----------------------------------------------------------
    # CORE — Transferencia eficiente
    # ----------------------------------------------------------
    sendfile    on;
    tcp_nopush  on;   # Envía headers + inicio del body en un paquete
    tcp_nodelay on;   # Sin buffering extra en conexiones keepalive

    # ----------------------------------------------------------
    # KEEPALIVE
    # ----------------------------------------------------------
    keepalive_timeout  65s;     # Más tiempo = menos handshakes SSL (costosos en CPU)
    keepalive_requests 1000;    # Balance entre reutilización y liberación de memoria

    # ----------------------------------------------------------
    # BUFFERS — Ajustados para headers modernos y payloads medianos
    # ----------------------------------------------------------
    # Con 8GB RAM podemos ser generosos en buffers
    # sin malgastar como lo harían los valores de 200GB RAM
    client_body_buffer_size       16k;
    client_header_buffer_size      2k;
    large_client_header_buffers  4 8k;
    client_max_body_size          20m;   # Para esta app (frontend SPA)

    # Output buffers
    output_buffers   2 32k;
    postpone_output  1460;  # Un MTU estándar

    # ----------------------------------------------------------
    # TIMEOUTS — Agresivos pero seguros para alta carga
    # ----------------------------------------------------------
    client_body_timeout    15s;
    client_header_timeout  15s;
    send_timeout           30s;
    reset_timedout_connection on;  # Libera memoria de conexiones muertas

    # ----------------------------------------------------------
    # FILE CACHE — Evita syscalls repetidas al abrir archivos
    # ----------------------------------------------------------
    # NVMe es rápido — no necesitamos cachear 200k entradas
    # 50k entradas × ~200 bytes overhead ≈ 10 MB de RAM bien usados
    open_file_cache          max=50000 inactive=30s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ----------------------------------------------------------
    # HASH TABLES
    # ----------------------------------------------------------
    types_hash_max_size      4096;
    types_hash_bucket_size   128;
    server_names_hash_max_size    512;
    server_names_hash_bucket_size  64;

    # ----------------------------------------------------------
    # LOGGING
    # ----------------------------------------------------------
    log_format main
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'rt=$request_time uct=$upstream_connect_time '
        'uht=$upstream_header_time urt=$upstream_response_time';

    # Buffer de 16k es suficiente para 200Mbit/s con NVMe
    # (NVMe tiene latencia ~0.1ms, no necesita buffer gigante)
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ----------------------------------------------------------
    # COMPRESIÓN — Gzip (Brotli requiere módulo adicional)
    # ----------------------------------------------------------
    gzip              on;
    gzip_comp_level   4;        # Con gzip_static en assets, el nivel 4 solo aplica a
                                # respuestas dinámicas — buen balance CPU/ratio en 4 vCPU
    gzip_min_length   512;      # No comprimir respuestas pequeñas (< 512 bytes no vale la pena)
    gzip_proxied      any;
    gzip_vary         on;       # Agrega Vary: Accept-Encoding al header
    gzip_buffers      8 16k;     # 128KB total — adecuado para 200Mbit/s

    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xhtml+xml
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        font/truetype
        font/opentype
        image/svg+xml;

    # ----------------------------------------------------------
    # PROXY — Si usas nginx como reverse proxy
    # ----------------------------------------------------------
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        Connection        "";    # Keepalive upstream

    proxy_connect_timeout   5s;
    proxy_send_timeout     30s;
    proxy_read_timeout     30s;

    proxy_buffer_size       16k;
    proxy_buffers           8 32k;
    proxy_busy_buffers_size 64k;

    # ----------------------------------------------------------
    # INCLUDES
    # ----------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}