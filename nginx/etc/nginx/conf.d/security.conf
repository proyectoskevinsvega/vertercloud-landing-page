# ============================================================
#  SECURITY HEADERS — Estilo Cloudflare
#  /etc/nginx/conf.d/security.conf
#  Autor: config profesional para producción
# ============================================================

# ----------------------------------------------------------
# 1. Ocultar versión del servidor
# ----------------------------------------------------------
server_tokens off;

# ----------------------------------------------------------
# 2. MIME sniffing protection
# ----------------------------------------------------------
add_header X-Content-Type-Options "nosniff" always;

# ----------------------------------------------------------
# 3. Clickjacking protection
# ----------------------------------------------------------
add_header X-Frame-Options "SAMEORIGIN" always;

# ----------------------------------------------------------
# 4. HSTS — Solo activar si HTTPS está garantizado en TODO
#    max-age=63072000 = 2 años
# ----------------------------------------------------------
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# ----------------------------------------------------------
# 5. Referrer Policy
# ----------------------------------------------------------
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ----------------------------------------------------------
# 6. Permissions Policy (Feature Policy moderna)
#    Deshabilitar APIs sensibles que la app no usa
# ----------------------------------------------------------
add_header Permissions-Policy "
  geolocation=(),
  microphone=(),
  camera=(),
  payment=(),
  usb=(),
  magnetometer=(),
  accelerometer=(),
  gyroscope=(),
  fullscreen=(self),
  display-capture=()
" always;

# ----------------------------------------------------------
# 7. Content Security Policy
#    Ajusta 'script-src' según tus CDNs reales.
#    Evitar 'unsafe-inline' siempre que sea posible;
#    usa nonces desde tu app si puedes.
# ----------------------------------------------------------
add_header Content-Security-Policy "
  default-src 'self';
  script-src  'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;
  style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src    'self' https://fonts.gstatic.com;
  img-src     'self' data: https:;
  connect-src 'self' https:;
  media-src   'none';
  object-src  'none';
  frame-src   'none';
  frame-ancestors 'none';
  base-uri    'self';
  form-action 'self';
  upgrade-insecure-requests;
" always;

# NOTA: El bloqueo de métodos HTTP no estándar se maneja
# en cada location{} del virtual host (no aquí globalmente).

# ----------------------------------------------------------
# 9. Cross-Origin policies (modernas, post-Spectre)
# ----------------------------------------------------------
add_header Cross-Origin-Opener-Policy   "same-origin" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# NOTA: Cache-Control se gestiona en cada location{} del virtual host.
# No se define aquí globalmente para no sobreescribir
# el caché de assets estáticos (js/css con 1y/immutable).