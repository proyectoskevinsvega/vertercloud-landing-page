# ============================================================
#  SSL COMPARTIDO — Cloudflare Origin Certificate
#  /etc/nginx/conf.d/ssl.conf
#
#  Aplica a TODOS los server{} con SSL en este VPS.
#  Define la zona shared:SSL una sola vez (compartida entre workers).
# ============================================================

# Certificado Cloudflare Origin (canal VPS ↔ Cloudflare)
# Los usuarios ven el certificado del Edge de Cloudflare, no este.
ssl_certificate     /etc/nginx/ssl/cloudflare-origin.crt;
ssl_certificate_key /etc/nginx/ssl/cloudflare-origin.key;

# Solo protocolos modernos
ssl_protocols             TLSv1.2 TLSv1.3;
ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
ssl_prefer_server_ciphers off;

# Sesión TLS — compartida entre los 4 workers y todos los virtual hosts
# 50m ≈ 200.000 sesiones cacheadas, reduce handshakes repetidos
ssl_session_cache   shared:SSL:50m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# OCSP Stapling deshabilitado:
# Cloudflare Origin CA no tiene responder OCSP público.
# Cloudflare hace OCSP stapling en su edge para el cert público.
ssl_stapling        off;
ssl_stapling_verify off;
