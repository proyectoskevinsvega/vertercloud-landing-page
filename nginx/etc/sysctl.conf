# ============================================================
#  KERNEL TUNING — Alto rendimiento para nginx 100k req/s
#  /etc/sysctl.conf
#
#  Aplicar sin reiniciar:
#    sudo sysctl -p
#
#  Verificar valor activo:
#    sysctl net.core.somaxconn
# ============================================================

# ------------------------------------------------------------
# BACKLOG DE CONEXIONES ENTRANTES
#
# somaxconn: máximo de conexiones en cola ESTABLECIDAS (ESTABLISHED)
#            esperando ser aceptadas por accept()
# netdev_max_backlog: paquetes encolados por NIC antes de que
#            el kernel los procese (previene drops en ráfagas)
# ------------------------------------------------------------
net.core.somaxconn            = 65535
net.core.netdev_max_backlog   = 65535

# ------------------------------------------------------------
# SYN BACKLOG Y COOKIES
#
# tcp_max_syn_backlog: cola SYN_RECV (handshakes a medio completar)
# syncookies: defensa contra SYN flood sin consumir memoria de cola
#             1 = activar solo cuando la cola se llena (recomendado)
# ------------------------------------------------------------
net.ipv4.tcp_max_syn_backlog  = 65535
net.ipv4.tcp_syncookies       = 1
net.ipv4.tcp_synack_retries   = 2
net.ipv4.tcp_syn_retries      = 2

# ------------------------------------------------------------
# RANGO DE PUERTOS EFÍMEROS
# Más puertos disponibles = más conexiones salientes posibles
# (relevante para nginx como proxy upstream)
# ------------------------------------------------------------
net.ipv4.ip_local_port_range  = 1024 65535

# ------------------------------------------------------------
# REUTILIZACIÓN Y CIERRE DE CONEXIONES
#
# tw_reuse: reutilizar sockets TIME_WAIT para nuevas conexiones
#           (solo para conexiones salientes, ej: nginx → upstream)
# fin_timeout: tiempo esperando FIN_WAIT2 antes de limpiar el socket
# ------------------------------------------------------------
net.ipv4.tcp_tw_reuse         = 1
net.ipv4.tcp_fin_timeout      = 15

# ------------------------------------------------------------
# KEEPALIVE A NIVEL KERNEL
#
# keepalive_time:   segundos de inactividad antes del primer probe
# keepalive_intvl:  segundos entre probes si no hay respuesta
# keepalive_probes: intentos antes de declarar la conexión muerta
# Total hasta detectar muerte: 300 + (30 × 5) = 450 segundos
# ------------------------------------------------------------
net.ipv4.tcp_keepalive_time   = 300
net.ipv4.tcp_keepalive_intvl  = 30
net.ipv4.tcp_keepalive_probes = 5

# ------------------------------------------------------------
# BUFFERS DE RED
#
# Aumentar buffers reduce retransmisiones en conexiones de alta
# latencia o alto throughput (especialmente útil con upstream remoto)
#
# rmem/wmem: [mínimo  default  máximo] en bytes
# ------------------------------------------------------------
net.core.rmem_default         = 262144
net.core.wmem_default         = 262144
net.core.rmem_max             = 16777216
net.core.wmem_max             = 16777216

net.ipv4.tcp_rmem             = 4096 87380 16777216
net.ipv4.tcp_wmem             = 4096 65536 16777216

# TCP autotuning (activado por defecto en kernels modernos, confirmarlo)
net.ipv4.tcp_moderate_rcvbuf  = 1

# ------------------------------------------------------------
# MEMORIA TCP GLOBAL
# Límites en páginas (1 página = 4096 bytes en x86_64)
# [presión  mínimo  máximo]
# ------------------------------------------------------------
net.ipv4.tcp_mem              = 786432 1048576 26777216

# ------------------------------------------------------------
# ALGORITMO DE CONTROL DE CONGESTIÓN
#
# BBR (Bottleneck Bandwidth and RTT) — desarrollado por Google
# Mejor throughput que cubic en redes con pérdida de paquetes
# Requiere kernel >= 4.9 y módulo tcp_bbr
#
# Verificar disponibilidad:
#   modprobe tcp_bbr && lsmod | grep bbr
# ------------------------------------------------------------
net.core.default_qdisc        = fq
net.ipv4.tcp_congestion_control = bbr

# ------------------------------------------------------------
# SEGURIDAD — Hardening de red
# ------------------------------------------------------------

# Ignorar paquetes ICMP broadcast (protección Smurf)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignorar respuestas ICMP erróneas
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Protección contra IP spoofing (verificación de ruta inversa)
# 1 = strict, 2 = loose (usa 2 si hay múltiples interfaces/rutas asimétricas)
net.ipv4.conf.all.rp_filter         = 1
net.ipv4.conf.default.rp_filter     = 1

# No aceptar rutas source-routed
net.ipv4.conf.all.accept_source_route    = 0
net.ipv4.conf.default.accept_source_route = 0

# No aceptar redirects ICMP (previene MITM por redirección de rutas)
net.ipv4.conf.all.accept_redirects       = 0
net.ipv4.conf.default.accept_redirects   = 0
net.ipv4.conf.all.send_redirects         = 0

# No enrutar paquetes entre interfaces (esto no es un router)
net.ipv4.ip_forward = 0

# Loggear paquetes con IPs imposibles (martians)
net.ipv4.conf.all.log_martians          = 1
net.ipv4.conf.default.log_martians      = 1

# ------------------------------------------------------------
# LÍMITES DE ARCHIVOS A NIVEL SISTEMA
# Complementa worker_rlimit_nofile de nginx
# ------------------------------------------------------------
fs.file-max                   = 2097152
fs.nr_open                    = 2097152